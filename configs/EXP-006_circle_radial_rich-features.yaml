# EXP-006: richer node features — [r, kappa, s/L]
# Parent: EXP-005 (best full-training run) + EXP-004 (logit transform)
# Change: input_dim=3, node features extended to [radius, curvature, arc-length fraction]
#   curvature:   computed numerically via 2D finite differences on Cartesian positions
#   arc-length:  normalised cumulative arc-length s_i / L ∈ [0, 1]
# Note: diffuses all 3 features jointly; evaluation uses x[:, 0] (radius only).

noise_schedule:
  schedule_type: "cosine"
  T: 200
  beta_start: 1e-4
  beta_end: 0.02

score_network:
  input_dim: 3               # [r, kappa, s/L]
  node_dim: 32
  edge_dim: 2
  global_dim: 8
  time_embed_dim: 64
  n_layers: 4
  hidden_dims: [64, 64]

circle_dataset:
  root: "data/circle_rich"   # separate cache — processed features differ
  n_graphs: 2000
  n_nodes: 64
  n_fourier_modes: 5
  amplitude_scale: 0.15
  r_min: 0.5
  r_max: 1.5
  k_neighbors: 2
  global_dim: 8
  seed: 42
  include_curvature: true
  include_arc_length: true

data:
  batch_size: 64
  val_split: 0.1
  num_workers: 4
  shuffle: true

mlp:
  activation: "silu"
  layer_norm: true
  residual: true

clamp_range: [0.5, 1.5]
