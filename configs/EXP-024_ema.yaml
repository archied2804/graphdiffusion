# EXP-024: EMA weights (decay=0.9999)
# ====================================
# Standard DDPM quality booster: maintain an exponential moving average
# of the model weights during training and use those at inference.
# Almost free at training time, well-documented to smooth DDPM output.
#
# Composes with whichever lever won the EXP-021..023 series — keep that
# experiment's other settings and only flip ema_decay on.

dataset_type: shape_conditional

ellipse_dataset:
  root: data/ellipse
  split: train
  feature_mode: radial_norm
  cond_mode: fourier
  k_modes: 8
  n_samples: null
  k_neighbors: 6
  global_dim: 8

data:
  batch_size: 32
  val_split: 0.1
  num_workers: 0
  shuffle: true

noise_schedule:
  T: 200
  schedule_type: cosine
  beta_start: 1.0e-4
  beta_end: 0.02

score_network:
  node_dim: 32
  edge_dim: 2
  global_dim: 8
  time_embed_dim: 64
  n_layers: 4
  hidden_dims: [64, 64]
  input_dim: 3
  output_dim: 1
  cond_dim: 8
  p_uncond: 0.15

pressure_head:
  in_dim: 3
  out_dim: 8
  node_hidden: [64, 64]
  global_hidden: [64, 64]
  node_embed_dim: 64

mlp:
  activation: silu
  layer_norm: true
  residual: true

model:
  n_noise_channels: 1
  lambda_pressure: 0.1

clamp_range: [0.5, 2.0]

sampling:
  guidance_scale: 3.0
  dps_guidance_weight: 0.0

training:
  scheduler: cosine_annealing
  eta_min: 1.0e-5
  early_stopping_patience: 100
  ema_decay: 0.9999       # EXP-024 toggle; loads checkpoint_ema.pt at eval
