# EXP-012: Radial shape generation + per-node pressure conditioning
# =================================================================
# Extends EXP-011 with full per-node pressure conditioning.
# p_cond = [cos θ, sin θ, p_node] (3 channels) — positional context
# prepended to the per-node pressure so the network retains spatial
# awareness of BOTH geometry AND the pressure field.
# Only r/r̄ is noised; the full p_cond is fixed at each reverse step.

dataset_type: conditional

ellipse_dataset:
  root: data/ellipse
  split: train
  feature_mode: radial_norm
  cond_type: node_concat
  n_samples: null
  k_neighbors: 6
  global_dim: 8
  time_index: -1           # last (most converged) pressure timestep

data:
  batch_size: 32
  val_split: 0.1
  num_workers: 0
  shuffle: true

noise_schedule:
  T: 200
  schedule_type: cosine
  beta_start: 1.0e-4
  beta_end: 0.02

score_network:
  node_dim: 32
  edge_dim: 2
  global_dim: 8
  time_embed_dim: 64
  n_layers: 4
  hidden_dims: [64, 64]
  input_dim: 4             # [r/r̄, cos θ, sin θ, p_node] — r is noised, rest fixed
  output_dim: 1            # predict noise for r channel only

mlp:
  activation: silu
  layer_norm: true
  residual: true

model:
  n_noise_channels: 1      # only r/r̄ is noised; [cos θ, sin θ, p_node] are fixed

clamp_range: [0.5, 2.0]   # normalised radii range [0.68, 1.37] with margin

training:
  scheduler: cosine_annealing
  eta_min: 1.0e-5
  early_stopping_patience: 20
