# EXP-025: v-prediction parameterisation
# ========================================
# Switch the score network's training target from ε to v (Salimans &
# Ho 2022). Empirically smoother fine detail than ε-prediction and is
# the only one of the four DDPM parameterisations that supports
# arbitrarily fast DDIM-style sampling later. Largest code change of
# the EXP-021..025 series — runs last.

dataset_type: shape_conditional

ellipse_dataset:
  root: data/ellipse
  split: train
  feature_mode: radial_norm
  cond_mode: fourier
  k_modes: 8
  n_samples: null
  k_neighbors: 6
  global_dim: 8

data:
  batch_size: 32
  val_split: 0.1
  num_workers: 0
  shuffle: true

noise_schedule:
  T: 200
  schedule_type: cosine
  beta_start: 1.0e-4
  beta_end: 0.02

score_network:
  node_dim: 32
  edge_dim: 2
  global_dim: 8
  time_embed_dim: 64
  n_layers: 4
  hidden_dims: [64, 64]
  input_dim: 3
  output_dim: 1
  cond_dim: 8
  p_uncond: 0.15

pressure_head:
  in_dim: 3
  out_dim: 8
  node_hidden: [64, 64]
  global_hidden: [64, 64]
  node_embed_dim: 64

mlp:
  activation: silu
  layer_norm: true
  residual: true

model:
  n_noise_channels: 1
  lambda_pressure: 0.1
  prediction_type: v        # EXP-025 toggle

clamp_range: [0.5, 2.0]

sampling:
  guidance_scale: 3.0
  dps_guidance_weight: 0.0

training:
  scheduler: cosine_annealing
  eta_min: 1.0e-5
  early_stopping_patience: 100
  ema_decay: 0.9999         # keep EMA on (cumulative win from EXP-024)
