# EXP-004: logit-transform bounded diffusion
# Parent: EXP-001 (configs/circle_radial.yaml)
# Change: replace post-hoc clamp with logit/sigmoid in diffusion space.
#   forward: r → logit((r - r_min)/(r_max - r_min))
#   inverse: z → sigmoid(z) * (r_max - r_min) + r_min
# clamp_range is removed — boundary satisfaction is enforced by the transform.

noise_schedule:
  schedule_type: "cosine"
  T: 200
  beta_start: 1e-4
  beta_end: 0.02

score_network:
  input_dim: 1
  node_dim: 32
  edge_dim: 2
  global_dim: 8
  time_embed_dim: 64
  n_layers: 4
  hidden_dims: [64, 64]

circle_dataset:
  root: "data/circle"
  n_graphs: 2000
  n_nodes: 64
  n_fourier_modes: 5
  amplitude_scale: 0.15
  r_min: 0.5
  r_max: 1.5
  k_neighbors: 2
  global_dim: 8
  seed: 42

data:
  batch_size: 64
  val_split: 0.1
  num_workers: 4
  shuffle: true

mlp:
  activation: "silu"
  layer_norm: true
  residual: true

feature_transform:
  type: logit_norm
  r_min: 0.5
  r_max: 1.5
